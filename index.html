function tt(o){ return o[lang]; }

function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.getElementById("ko").className = l==="ko" ? "on" : "";
  document.getElementById("en").className = l==="en" ? "on" : "";
  render();
}
function go(r){ selected = null; textOpen = "statement"; route = r; render(); window.scrollTo(0,0); }

function render(){
  document.body.classList.toggle('home-mode', route==="home");
  document.body.classList.toggle('lang-en', lang==="en");
  document.body.classList.toggle('route-work', route==="work");
  var hb = document.getElementById("home-bg");
  if(HOME_BG) hb.style.backgroundImage = 'url("'+HOME_BG+'")';

  var mn = document.getElementById("menu"); mn.innerHTML = "";
  MENU.forEach(function(m){
    var b = document.createElement("button");
    b.textContent = m[1];
    if(route===m[0]) b.className = "active";
    b.onclick = function(){ go(m[0]); };
    mn.appendChild(b);
  });

  ["work","text","cv"].forEach(function(p){ document.getElementById(p).classList.remove("active"); });
  if(route==="home") return;

  if(route==="work") renderWork();
  if(route==="text") renderText();
  if(route==="cv") renderCV();
  document.getElementById(route).classList.add("active");
}

function stillsHTML(w){
  var cap = w.caption ? tt(w.caption) : null;
  var capHtml = cap ? '<div class="d-cap">'+(Array.isArray(cap)?cap.map(function(l){return '<div class="cap-line">'+l+'</div>';}).join(""):cap)+'</div>' : "";
  if(!w.images || !w.images.length) return capHtml;
  var n = 0;
  function alt(){                                   // 스크린 리더와 검색엔진이 읽는 대체 텍스트
    n++;
    return tt(w.title)+' — '+(lang==="ko"?"이미지":"image")+' '+n;
  }
  var inner = w.images.map(function(it){
    if(typeof it === "string") return '<img class="stack-img" src="'+it+'" alt="'+alt()+'" loading="lazy">';
    if(it && it.gap) return '<div style="height:'+it.gap+'px"></div>';
    if(it && it.src) return '<img class="stack-img" src="'+it.src+'" alt="'+alt()+'" loading="lazy"'+(it.w?' style="width:'+it.w+';align-self:center;"':'')+'>';
    if(it && it.cap){
      var css = it.w ? 'align-self:center;width:'+it.w+'px;max-width:100%;' : "";
      if(it.style) css += it.style;
      var cs = css ? ' style="'+css+'"' : "";
      return '<div class="stack-cap'+(it.indent?" indent":"")+'"'+cs+'>' + (it.cap[lang]||[]).map(function(l){ return '<div class="cap-line">'+l+'</div>'; }).join("") + '</div>';
    }
    return "";
  }).join("");
  return '<div class="img-stack">'+inner+'</div>'+capHtml;
}

function trackRow(w){
  var cls = "track"+(w.id===selected?" active":"");
  var t = w.tr||{}, mid;
  if(w.kind==="o"){
    var sv = t.siz ? tt(t.siz) : "";
    mid = sv ? '<span class="f mat">'+(t.mat?tt(t.mat):"")+'</span><span class="f siz">'+sv+'</span>'
             : '<span class="f matfull">'+(t.mat?tt(t.mat):"")+'</span>';
  } else if(t.status){
    mid = '<span class="f prog">'+(t.ch?tt(t.ch)+' · ':"")+tt(t.status)+'</span>';
  } else {
    mid = '<span class="f">'+tt(t.ch)+'</span><span class="f">'+t.run+'</span>'
        + '<span class="f">'+t.res+'</span><span class="f">'+tt(t.col)+'</span>'
        + '<span class="f">'+tt(t.snd)+'</span><span class="f fps">'+(t.fps||"")+'</span>';
  }
  var cells = '<span class="ttitle">'+tt(w.title)+'</span>'
    + '<span class="specs">'+mid+'</span>'
    + '<span class="yr">'+w.year+'</span>';
  return '<button class="'+cls+'" data-year="'+w.year+'" onclick="pick(\''+w.id+'\')">'+cells+'</button>';
}

var stageWorkId;   // 현재 stage에 올라가 있는 작업 id. 미설정(undefined)은 "아직 안 그림"이며 selected===null 과 구별된다.

var yearFilter = null;   // null = 전체. 모바일에서만 의미를 갖는다.

function yearsList(){
  var seen = [];
  WORKS.forEach(function(w){ if(seen.indexOf(w.year)<0) seen.push(w.year); });
  return seen.slice().sort().reverse();   // 내림차순: 2026 … 2022
}

function pickYear(y){
  yearFilter = y;      // y === null 이면 전체
  selected = null;     // 다른 해로 옮기면 선택을 푼다
  renderWork();
  var strip = document.querySelector(".yr-strip");
  var on = strip && strip.querySelector(".yr-btn.on");
  if(on && strip.scrollWidth > strip.clientWidth){
    on.scrollIntoView({inline:"center", block:"nearest", behavior:"smooth"});
  }
}

function yearNavHTML(){
  var ys = yearsList();
  var strip = ys.map(function(y){
    return '<button class="yr-btn'+(yearFilter===y?" on":"")+'" onclick="pickYear(\''+y+'\')">'+y+'</button>';
  }).join("");
  var all = '<button class="yr-btn yr-all'+(yearFilter===null?" on":"")+'" onclick="pickYear(null)">'
          + (lang==="ko"?"전체":"All")+'</button>';
  return '<div class="yr-nav"><div class="yr-strip">'+strip+'</div>'+all+'</div>';
}

function renderWork(){
  var root = document.getElementById("work");

  // 골격은 한 번만 만든다. innerHTML을 다시 쓰면 iframe이 파괴되어 영상이 재로딩된다.
  if(!root.querySelector(".player")){
    root.innerHTML =
      '<div class="player"><div class="pl-left">'
      + '<div class="yr-nav-slot"></div>'
      + '<div class="stage-holder"></div><div class="tracklist"></div>'
      + '</div><div class="pl-right"></div></div>';
    stageWorkId = undefined;
    if(yearFilter === undefined || yearFilter === null) yearFilter = WORKS[0].year;  // 기본값: 최신 연도
  }

  var holder = root.querySelector(".stage-holder");
  var w = selected ? WORKS.filter(function(x){ return x.id===selected; })[0] : null;

  // stage는 작업이 실제로 바뀐 경우에만 다시 만든다 (언어 전환 시 영상 유지)
  if(stageWorkId !== selected){
    if(w && w.embed){
      var cap = w.videoWidth ? ' style="--stage-max:'+w.videoWidth+'"' : '';
      holder.innerHTML = '<div class="stage"'+cap+'><iframe class="vfill" src="'+w.embed+'" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div>';
    } else {
      holder.innerHTML = '<div class="stage"></div>';
    }
    stageWorkId = selected;
  }

  root.querySelector(".yr-nav-slot").innerHTML = yearNavHTML();
  root.querySelector(".tracklist").innerHTML = WORKS.map(trackRow).join("");
  root.querySelector(".pl-right").innerHTML = w
    ? (stillsHTML(w) || (w.embed ? "" : '<div class="ph">'+(lang==="ko"?"준비 중":"coming soon")+'</div>'))
    : '<div class="ph"><em>select a work from the list</em></div>';

  layoutMobileOrder(root);
}

/* 모바일 아코디언: 영상·이미지를 선택한 행 바로 뒤에 오도록 order 를 매긴다.
   iframe 은 DOM 에서 움직이지 않으므로 재로딩되지 않는다. 데스크톱에서는 order 가 무시된다. */
function layoutMobileOrder(root){
  var rows = [].slice.call(root.querySelectorAll(".track"));
  var activeIdx = -1;
  rows.forEach(function(r, i){
    r.style.setProperty("--o", i*10);     // order 는 모바일 CSS 에서만 소비한다
    var y = r.getAttribute("data-year");
    r.classList.toggle("hide-m", yearFilter !== null && y !== yearFilter);
    if(r.classList.contains("active")) activeIdx = i;
  });
  var holder = root.querySelector(".stage-holder");
  var right  = root.querySelector(".pl-right");
  if(activeIdx > -1){
    holder.style.setProperty("--o", activeIdx*10 + 5);
    right.style.setProperty("--o", activeIdx*10 + 6);
  } else {
    holder.style.setProperty("--o", 100000);
    right.style.setProperty("--o", 100001);
  }
}

function pick(id){
  selected = (selected===id) ? null : id;   // 같은 작품을 다시 누르면 닫는다
  renderWork();
  // 모바일에서는 그 자리에서 펼쳐지므로 화면을 위로 튕기지 않는다
  if(!window.matchMedia("(max-width:768px)").matches) window.scrollTo(0,0);
}
function pickText(id){ textOpen = (textOpen===id) ? null : id; renderText(); }

function textLines(t, key){
  var o = t[key] || {};
  return (o[lang] && o[lang].length) ? o[lang] : (o.ko || []);
}

/* 스테이트먼트 항목 라벨. 해가 바뀌면 이 숫자만 고치면 된다. */
var STMT_LABEL = "[2026 note]";

function renderText(){
  var stTitle = '<span class="stmt-mark">'+STMT_LABEL+'</span>';

  var detail = buildTextDetail();
  // 모바일에서는 본문이 자기 항목 바로 아래로 펼쳐진다. 데스크톱에서는 이 사본을 감춘다.
  var inline = detail ? '<div class="texts-detail detail-inline">'+detail+'</div>' : "";

  var list = '<button class="t-title'+(textOpen==="statement"?" active":"")+'" onclick="pickText(\'statement\')">'+stTitle+'</button>'
    + (textOpen==="statement" ? inline : "")
    + '<div class="t-gap"></div>'
    + TEXTS.map(function(t){
        var cls = "t-title"+(t.id===textOpen?" active":"");
        return '<button class="'+cls+'" onclick="pickText(\''+t.id+'\')">'+tt(t.title)+'</button>'
             + (t.id===textOpen ? inline : "");
      }).join("");

  var html = '<div class="texts-page">'
    + '<div class="texts-wrap">'
    + '<div class="texts-list">'+list+'</div>'
    + '<div class="texts-detail detail-main">'+detail+'</div>'
    + '</div></div>';

  document.getElementById("text").innerHTML = html;
}

function buildTextDetail(){
  if(textOpen==="statement"){
    return '<div class="t-body t-stmt">'+STATEMENT[lang].map(function(p){ return '<p>'+p+'</p>'; }).join("")+'</div>';
  }
  if(!textOpen) return "";
  var t = TEXTS.filter(function(x){ return x.id===textOpen; })[0];
  if(!t) return "";
    var body = textLines(t,"body").map(function(p){
      if(p.indexOf("q:")===0) return '<p class="q">'+p.slice(2)+'</p>';
      if(p.indexOf("h:")===0) return '<p class="h">'+p.slice(2)+'</p>';
      return '<p>'+p+'</p>';
    }).join("");
    var notes = textLines(t,"notes");
    var notesHtml = notes.length ? '<div class="t-notes">'+notes.map(function(n){ return '<p>'+n+'</p>'; }).join("")+'</div>' : "";
    var sign = textLines(t,"sign");
    var signHtml = sign.length ? '<div class="t-sign">'+sign.map(function(l){ return '<div>'+l+'</div>'; }).join("")+'</div>' : "";
    var linkHtml = "";
    if(t.link){
      linkHtml = '<div class="t-src"><a class="t-link" href="'+t.link.url+'" target="_blank" rel="noopener">'
               + (t.link.label[lang]||t.link.label.ko) + '</a></div>';
    }
    var full = tt(t.title), head;
    var bar = full.lastIndexOf("|");
    if(bar > -1){
      head = '<div class="t-head"><div class="t-h-title">'+full.slice(0,bar).trim()+'</div>'
           + '<div class="t-h-by">'+full.slice(bar+1).trim()+'</div></div>';
    } else {
      head = '<div class="t-head"><div class="t-h-title">'+full+'</div></div>';
    }
    return '<div class="t-sheet">'+head+'<div class="t-body">'+body+'</div>'+notesHtml+signHtml+linkHtml+'</div>';
}

function renderCV(){
  var ig = CONTACT.instagram.replace(/^@/, "");   // URL에는 @를 넣지 않는다
  var html = '<div class="contact"><div class="cv-sec">'
    + '<div class="row"><a class="link" href="mailto:'+CONTACT.email+'">'+CONTACT.email+'</a></div>'
    + '<div class="row"><a class="link" href="https://www.instagram.com/'+ig+'/" target="_blank" rel="noopener">@'+ig+'</a></div>'
    + '</div></div>';
  CV[lang].forEach(function(sec){
    html += '<div class="cv-sec"><h3>'+sec.h+'</h3>';
    sec.items.forEach(function(it){ html += '<div class="row">'+it+'</div>'; });
    html += '</div>';
  });
  document.getElementById("cv").innerHTML = html;
}

document.getElementById("brand").onclick = function(){ go(route==="home" ? "work" : "home"); };
document.getElementById("home-bg").onclick = function(){ go("work"); };
document.getElementById("ko").onclick = function(){ setLang("ko"); };
document.getElementById("en").onclick = function(){ setLang("en"); };

render();
</script>
